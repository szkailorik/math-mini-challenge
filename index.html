        /* ================= 控制面板 ================= */

        function getStoredProgramId() {
            const stored = localStorage.getItem(PROGRAM_STORAGE_KEY) || 'advanced_fluency_v1';
            if (TRAINING_PROGRAMS[stored]?.enabled) return stored;
            return 'advanced_fluency_v1';
        }

        function readStoredJSON(key, fallback) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return fallback;
                const parsed = JSON.parse(raw);
                return parsed && typeof parsed === 'object' ? parsed : fallback;
            } catch (e) {
                return fallback;
            }
        }

        function getDefaultSetNumberForProgram(programId) {
            return programId === CLOSURE_PROGRAM_ID ? 1 : 73;
        }

        function getStoredSetCounters() {
            const counters = readStoredJSON(SET_COUNTERS_STORAGE_KEY, {});
            const legacy = Number.parseInt(localStorage.getItem('MathEngine_LastSetNum'), 10);
            if (Number.isInteger(legacy) && legacy > 0 && !Number.isInteger(counters[ADVANCED_PROGRAM_ID])) {
                counters[ADVANCED_PROGRAM_ID] = legacy;
            }
            return counters;
        }

        function persistSetCounters() {
            safeLocalSetItem(SET_COUNTERS_STORAGE_KEY, JSON.stringify(window.setCounterByProgram || {}));
            safeLocalSetItem('MathEngine_LastSetNum', window.currentSetNumber);
        }

        function ensurePromotionStateShape(state) {
            const next = state && typeof state === 'object' ? state : {};
            next.closureDeferUntilSet = Number.isInteger(next.closureDeferUntilSet) ? next.closureDeferUntilSet : 0;
            next.promotionHistory = Array.isArray(next.promotionHistory) ? next.promotionHistory : [];
            next.closureBootstrapped = !!next.closureBootstrapped;
            next.closureIntroDismissedVersion = next.closureIntroDismissedVersion || '';
            next.pendingProgramId = typeof next.pendingProgramId === 'string' ? next.pendingProgramId : '';
            next.lastReadinessSnapshot = next.lastReadinessSnapshot && typeof next.lastReadinessSnapshot === 'object' ? next.lastReadinessSnapshot : null;
            return next;
        }

        function savePromotionState() {
            window.promotionState = ensurePromotionStateShape(window.promotionState);

        // ================= v21 彻底优化的分式运算引擎 (防负数、防除不尽、防浮点误差) =================
        class Frac {
            constructor(n, d) {
                const nr = numberToRatio(n);
                const dr = numberToRatio(d);
                const nn = nr.n * dr.d;
                const dd = nr.d * dr.n;
                if (dd === 0) { this.n = 0; this.d = 1; return; }
                if (nn === 0) { this.n = 0; this.d = 1; return; }
                let g = gcdInt(nn, dd);
                this.n = nn / g; this.d = dd / g;
                if (this.d < 0) { this.n *= -1; this.d *= -1; }
            }
            add(o) { return new Frac(this.n * o.d + o.n * this.d, this.d * o.d); }
            sub(o) { return new Frac(this.n * o.d - o.n * this.d, this.d * o.d); }
            mul(o) { return new Frac(this.n * o.n, this.d * o.d); }
            div(o) { return new Frac(this.n * o.d, this.d * o.n); }
            toHTML() {
                if (this.d === 1 || this.n === 0) return `${this.n}`;
                return `<div class="frac"><span>${this.n}</span><span class="bottom">${this.d}</span></div>`;
            }
            toMixedHTML() {
                if (this.d === 1 || this.n === 0) return `${this.n}`;
                if (Math.abs(this.n) > this.d) {
                    let w = Math.floor(Math.abs(this.n) / this.d) * (this.n < 0 ? -1 : 1); let rem = Math.abs(this.n) % this.d;
                    if (rem === 0) return `${w}`;
                    return `<div class="mixed">${w}<div class="frac"><span>${rem}</span><span class="bottom">${this.d}</span></div></div>`;
                }
                return this.toHTML();
            }
        }

        function hashString(s) {

            for (let i = 0; i < s.length; i++) {

            if (t.startsWith('c2_speed_')) return 'speedGap';
            if (t.startsWith('c2_est_')) return 'validationGap';
            if (/^(k_ddiv_|l_div_|k_dmul_|l_mul_|k_sub_|l_sub_)/.test(t)) return 'stabilityGap';
            return null;
        }

        function getProgramSignalDelta(programId, tag, grade) {
            if (programId !== CLOSURE_PROGRAM_ID) return null;
            const field = getClosureSignalField(tag);
            if (!field) return null;
            if (grade === 'wrong') return { field, delta: 2 };
            if (grade === 'careless') return { field, delta: 1 };
            if (grade === 'perfect') return { field, delta: -1 };
            return null;
        }

        function snapshotProgramSignals(profile, programId = getCurrentProgramId()) {
            if (programId !== CLOSURE_PROGRAM_ID) return null;
            return PROGRAM_SIGNAL_FIELDS.reduce((acc, field) => {
                acc[field] = Number(profile[field] || 0);
                return acc;
            }, {});
        }

        const GistSync = {
            TOKEN_KEY: 'MathGistSync_token',
            GIST_ID_KEY: 'MathGistSync_gistId',
            LAST_PUSH_KEY: 'MathGistSync_lastPushTs',
            LAST_PULL_KEY: 'MathGistSync_lastPullTs',
            _pushTimer: null,
            _lastError: null,

            getToken: () => localStorage.getItem('MathGistSync_token'),
            setToken: (t) => localStorage.setItem('MathGistSync_token', t),
            clearCreds: () => {
                localStorage.removeItem('MathGistSync_token');
                localStorage.removeItem('MathGistSync_gistId');
                localStorage.removeItem('MathGistSync_lastPushTs');
                localStorage.removeItem('MathGistSync_lastPullTs');
            },
            getGistId: () => localStorage.getItem('MathGistSync_gistId'),
            setGistId: (id) => localStorage.setItem('MathGistSync_gistId', id),

            _headers: function() {
                return {
                    'Authorization': `Bearer ${this.getToken()}`,
                    'Accept': 'application/vnd.github+json',
                    'X-GitHub-Api-Version': '2022-11-28',
                    'Content-Type': 'application/json'
                };
            },

            // 校验 token 有效 + 定位/创建同步用的 gist
            connect: async function() {
                if (!this.getToken()) throw new Error('未配置 token');
                // 先验证 token 本身
                let who = await fetch('https://api.github.com/user', { headers: this._headers() });
                if (who.status === 401) throw new Error('Token 无效或已失效');
                if (!who.ok) throw new Error(`GitHub API ${who.status}`);
                let user = await who.json();

                // 已记录 gist ID 就复用
                let gid = this.getGistId();
                if (gid) {
                    let r = await fetch(`https://api.github.com/gists/${gid}`, { headers: this._headers() });
                    if (r.status === 200) return { gistId: gid, login: user.login, gist: await r.json() };
                    if (r.status === 404) this.setGistId(''); // 用户在 GitHub 手动删了，重建
                }

                // 扫描用户 gist 列表找同步 gist
                let list = await fetch('https://api.github.com/gists?per_page=100', { headers: this._headers() });
                if (!list.ok) throw new Error(`列出 gist 失败 ${list.status}`);
                let gists = await list.json();
                let found = gists.find(g => g.description === GIST_DESC);
                if (found) {
                    this.setGistId(found.id);
                    let r = await fetch(`https://api.github.com/gists/${found.id}`, { headers: this._headers() });
                    return { gistId: found.id, login: user.login, gist: await r.json() };
                }

                // 新建
                let create = await fetch('https://api.github.com/gists', {
                    method: 'POST', headers: this._headers(),
                    body: JSON.stringify({
                        description: GIST_DESC,
                        public: false,
                        files: {
                            [GIST_SENTINEL_FILE]: { content: JSON.stringify({ version: APP_VERSION, createdAt: Date.now(), note: 'Auto-managed by Mini Challenge. Do not hand-edit.' }, null, 2) }
                        }
                    })
                });
                if (!create.ok) throw new Error(`创建 gist 失败 ${create.status}`);
                let g = await create.json();
                this.setGistId(g.id);
                return { gistId: g.id, login: user.login, gist: g };
            },

            // 从 gist 拉取数据
            pull: async function() {
                let gid = this.getGistId();
                if (!gid) return null;
                let r = await fetch(`https://api.github.com/gists/${gid}`, { headers: this._headers() });
                if (!r.ok) {
                    this._lastError = `拉取失败 HTTP ${r.status}`;
                    return null;
                }
                let g = await r.json();
                let out = { KAI: null, Lorik: null, meta: null };
                for (let fn of ['KAI.json', 'Lorik.json', 'meta.json']) {
                    let f = g.files[fn];
                    if (!f) continue;
                    try {
                        // 内容可能被 GitHub 截断：fetch raw_url
                        let content = f.truncated ? await (await fetch(f.raw_url)).text() : f.content;
                        out[fn.replace('.json','')] = JSON.parse(content);
                    } catch(e) {}
                }
                localStorage.setItem(this.LAST_PULL_KEY, String(Date.now()));
                return out;
            },

            // 推送整份数据到 gist（PATCH，会覆盖对应文件）
            push: async function(payload) {
                let gid = this.getGistId();
                if (!gid) throw new Error('未连接');
                let files = {};
                let nowTs = Date.now();
                if (payload.KAI)   files['KAI.json']   = { content: JSON.stringify({...payload.KAI,   _ts: nowTs}, null, 2) };
                if (payload.Lorik) files['Lorik.json'] = { content: JSON.stringify({...payload.Lorik, _ts: nowTs}, null, 2) };
                files['meta.json'] = { content: JSON.stringify({
                    lastSetNum: window.currentSetNumber,
                    pushedAt: nowTs,
                    pushedFrom: navigator.userAgent.slice(0, 80),
                    version: APP_VERSION
                }, null, 2) };

                let r = await fetch(`https://api.github.com/gists/${gid}`, {
                    method: 'PATCH', headers: this._headers(),
                    body: JSON.stringify({ files })
                });
                if (!r.ok) {
                    this._lastError = `推送失败 HTTP ${r.status}`;
                    throw new Error(this._lastError);
                }
                this._lastError = null;
                localStorage.setItem(this.LAST_PUSH_KEY, String(nowTs));
                return true;
            },

            // 防抖推送：2 秒内多次触发只会真正请求 1 次
            pushDebounced: function(payloadGetter, delay = 2500) {
                clearTimeout(this._pushTimer);
                this._pushTimer = setTimeout(async () => {
                    if (!this.getToken() || !this.getGistId()) return;
                    try {
                        await this.push(typeof payloadGetter === 'function' ? payloadGetter() : payloadGetter);
                        updateCloudStatus();
                    } catch(e) {
                        console.warn('Gist 推送失败:', e);
                        updateCloudStatus();
                    }
                }, delay);
            },

            // 手动立即同步（忽略 debounce）
            pushNow: async function(payload) {
                clearTimeout(this._pushTimer);
                if (!this.getToken() || !this.getGistId()) throw new Error('未连接');
                return await this.push(payload);
            }
        };
        window.GistSync = GistSync;

        // 把 local 与 cloud 两份 profile 做安全合并（不丢失任一端的数据）
        function mergeProgramProfiles(local, cloud, programId = ADVANCED_PROGRAM_ID) {
            if (!cloud) return ensureProgramProfileShape(local || createProgramProfile(programId), programId);
            if (!local) return ensureProgramProfileShape(cloud || createProgramProfile(programId), programId);
            local = ensureProgramProfileShape(local, programId);
            cloud = ensureProgramProfileShape(cloud, programId);
            let merged = createProgramProfile(programId);

            Object.keys({...local.weights, ...cloud.weights}).forEach(k => {
                merged.weights[k] = Math.max(local.weights[k]||0, cloud.weights[k]||0);
            });
            Object.keys({...local.lastSeen, ...cloud.lastSeen}).forEach(k => {
                merged.lastSeen[k] = Math.max(local.lastSeen[k]||0, cloud.lastSeen[k]||0);
            });

            // history：按 set 合并，保留 ts 更新的那份
            let hMap = new Map();
            (local.history||[]).forEach(h => hMap.set(h.set, h));
            (cloud.history||[]).forEach(h => {
                let existing = hMap.get(h.set);
                if (!existing || (h.ts||0) > (existing.ts||0)) hMap.set(h.set, h);
            });
            merged.history = Array.from(hMap.values()).sort((a,b) => (a.ts||0) - (b.ts||0));
            if (merged.history.length > 60) merged.history = merged.history.slice(-60);

            const historyErrorCounts = new Map();
            merged.history.forEach(h => {
                (h.details || []).forEach(d => {
                    const uid = d.uid || (d.info && d.tag ? computeErrorUid(d.tag, d.info.q) : '');
                    if (uid) historyErrorCounts.set(uid, (historyErrorCounts.get(uid) || 0) + 1);
                });
            });

            // errorBook：按 uid 并集，数字字段取安全合并
            let ebUids = new Set([
                ...Object.keys(local.errorBook||{}),
                ...Object.keys(cloud.errorBook||{})
            ]);
            ebUids.forEach(uid => {
                let a = (local.errorBook||{})[uid];
                let b = (cloud.errorBook||{})[uid];
                if (!a) { merged.errorBook[uid] = b; return; }
                if (!b) { merged.errorBook[uid] = a; return; }
                // 两端都有 → 取保守合并
                const mergedTag = a.tag || b.tag;
                const mergedInfo = (a.lastSet||0) >= (b.lastSet||0) ? a.info : b.info;
                merged.errorBook[uid] = {
                    tag: mergedTag,
                    info: mergedInfo,
                    grade: (a.grade === 'wrong' || b.grade === 'wrong') ? 'wrong' : 'careless',
                    count: Math.max(a.count||1, b.count||1, historyErrorCounts.get(uid)||0),
                    firstSet: Math.min(a.firstSet||a.lastSet, b.firstSet||b.lastSet),
                    firstDate: (a.firstSet||0) <= (b.firstSet||0) ? (a.firstDate||b.firstDate) : (b.firstDate||a.firstDate),
                    lastSet: Math.max(a.lastSet||0, b.lastSet||0),
                    lastDate: (a.lastSet||0) >= (b.lastSet||0) ? (a.lastDate||b.lastDate) : (b.lastDate||a.lastDate),
                    mechanismKey: a.mechanismKey || b.mechanismKey || getErrorMechanismKey(mergedTag, mergedInfo),
                    mastered: !!a.mastered && !!b.mastered, // 双方都标记掌握才算掌握
                    masteredDate: (a.mastered && b.mastered) ? (a.masteredDate || b.masteredDate) : null
                };
            });
            if (programId === CLOSURE_PROGRAM_ID) {
                PROGRAM_SIGNAL_FIELDS.forEach(field => {
                    merged[field] = Math.max(local[field] || 0, cloud[field] || 0);
                });
            }
            return merged;
        }
        function mergeProfiles(local, cloud) {
            if (!cloud) return ensureStudentRecordShape(local || createProgramProfile(ADVANCED_PROGRAM_ID));
            if (!local) return ensureStudentRecordShape(cloud || createProgramProfile(ADVANCED_PROGRAM_ID));
            const localRecord = ensureStudentRecordShape(local);
            const cloudRecord = ensureStudentRecordShape(cloud);
            let merged = mergeProgramProfiles(localRecord, cloudRecord, ADVANCED_PROGRAM_ID);
            merged.programs = {};
            const programIds = new Set([
                ...Object.keys(localRecord.programs || {}),
                ...Object.keys(cloudRecord.programs || {})
            ]);
            programIds.forEach(programId => {
                merged.programs[programId] = mergeProgramProfiles(localRecord.programs?.[programId], cloudRecord.programs?.[programId], programId);
            });
            return ensureStudentRecordShape(merged);
        }
        window.mergeProfiles = mergeProfiles;

        // 更新右上角云端状态徽章
        function updateCloudStatus() {
            let el = document.getElementById('cloud-status');
            let shortcut = document.getElementById('cloud-connect-shortcut');
            if (!el) return;
            let token = GistSync.getToken();
            let gid = GistSync.getGistId();
            if (token && gid) {
                if (shortcut) shortcut.style.display = 'none';
                let lastPush = parseInt(localStorage.getItem(GistSync.LAST_PUSH_KEY)) || 0;
                let lastPull = parseInt(localStorage.getItem(GistSync.LAST_PULL_KEY)) || 0;
                let lastSync = Math.max(lastPush, lastPull);
                let ago = lastSync ? `${Math.max(1, Math.floor((Date.now() - lastSync) / 1000))}s 前` : '尚未同步';
                if (GistSync._lastError) {
                    el.innerText = `⚠️ Gist 同步异常：${GistSync._lastError}`;
                    el.style.color = '#fca5a5';
                } else {
                    el.innerText = `☁️ Gist 自动同步已连接 · 最近读/写 ${ago}`;
                    el.style.color = '#4ade80';
                }
            } else if (token && !gid) {
                if (shortcut) {
                    shortcut.style.display = 'block';
                    shortcut.innerText = '🔌 完成云同步连接';
                }
                el.innerText = `🔌 Token 已设置，但还未完成 Gist 连接 · 点击处理`;
                el.style.color = '#fde68a';
            } else {
                if (shortcut) {
                    shortcut.style.display = 'block';
                    shortcut.innerText = '☁️ 连接云同步 / Connect Sync';
                }
                el.innerText = '💾 本地模式 · 此设备尚未连接云端 · 点击连接';
                el.style.color = '#fde68a';
            }
        }
        window.updateCloudStatus = updateCloudStatus;

        // ================= v23.7 存储层（local + optional Gist 同步） =================
        const StorageDB = {
            mode: 'local', // 'local' | 'gist'
            _lastAutoPull: 0,
            cache: {
                KAI:   ensureStudentRecordShape(createProgramProfile(ADVANCED_PROGRAM_ID)),
                Lorik: ensureStudentRecordShape(createProgramProfile(ADVANCED_PROGRAM_ID))
            },

            // 启动流程：1) 读本地 2) 如果有 token，拉云端并合并
            init: async function() {
                this.fallbackLocal();
                updateCloudStatus();
                if (GistSync.getToken()) {
                    try {
                        // 确保 gistId 有效；如无则查找或新建
                        await GistSync.connect();
                        let cloud = await GistSync.pull();
                        if (cloud) {
                            this.cache.KAI   = mergeProfiles(this.cache.KAI,   this.migrateProfile(cloud.KAI));
                            this.cache.Lorik = mergeProfiles(this.cache.Lorik, this.migrateProfile(cloud.Lorik));
                            // 合并结果写回本地
                            safeLocalSetItem('MathProfile_master_KAI',   JSON.stringify(this.cache.KAI));
                            safeLocalSetItem('MathProfile_master_Lorik', JSON.stringify(this.cache.Lorik));
                            // 如果云端带了 lastSetNum 且本地未设置，采用云端的
                            if (cloud.meta && cloud.meta.lastSetNum && !localStorage.getItem('MathEngine_LastSetNum')) {
                                window.currentSetNumber = cloud.meta.lastSetNum;
                                safeLocalSetItem('MathEngine_LastSetNum', window.currentSetNumber);
                            }
                        }
                        this.mode = 'gist';
                        // 把合并后的最终状态回推到云端，保证两端一致
                        GistSync.pushDebounced(() => ({ KAI: this.cache.KAI, Lorik: this.cache.Lorik }), 500);
                    } catch(e) {
                        console.warn('Gist 同步启动失败，回退本地模式:', e);
                        GistSync._lastError = e.message || String(e);
                    }
                }
                updateCloudStatus();
            },
            migrateProgramProfile: function(data, programId = ADVANCED_PROGRAM_ID) {
                let profile = ensureProgramProfileShape({
                    weights: data?.weights || {},
                    lastSeen: data?.lastSeen || {},
                    history: data?.history || [],
                    errorBook: data?.errorBook || {}
                }, programId);
                profile.history = profile.history.map(session => ({
                    ...session,
                    details: session.details || [],
                    allGrades: session.allGrades || [],
                    weightAdjustments: session.weightAdjustments || [],
                    signalAdjustments: session.signalAdjustments || [],
                    signalSnapshot: session.signalSnapshot || null,
                    programId: session.programId || programId
                }));
                // v22 迁移：如果旧数据只有 history 没有 errorBook，从 history 重建
                if (Object.keys(profile.errorBook).length === 0 && profile.history.length > 0) {
                    profile.history.forEach(session => {
                        (session.details || []).forEach(detail => {
                            if (!detail.info || !detail.tag) return;
                            let uid = computeErrorUid(detail.tag, detail.info.q);
                            if (profile.errorBook[uid]) {
                                profile.errorBook[uid].count += 1;
                                if (detail.grade === 'wrong') profile.errorBook[uid].grade = 'wrong';
                                profile.errorBook[uid].lastSet = session.set;
                                profile.errorBook[uid].lastDate = session.date;
                                profile.errorBook[uid].mechanismKey = profile.errorBook[uid].mechanismKey || getErrorMechanismKey(detail.tag, detail.info);
                            } else {
                                profile.errorBook[uid] = {
                                    tag: detail.tag, info: detail.info, grade: detail.grade,
                                    count: 1,
                                    firstSet: session.set, firstDate: session.date,
                                    lastSet: session.set, lastDate: session.date,
                                    mechanismKey: getErrorMechanismKey(detail.tag, detail.info),
                                    mastered: false
                                };
                            }
                        });
                    });
                }
                Object.keys(profile.errorBook).forEach(uid => {
                    let entry = profile.errorBook[uid] || {};
                    entry.count = Math.max(1, Number.parseInt(entry.count, 10) || 1);
                    entry.mastered = !!entry.mastered;
                    entry.mechanismKey = entry.mechanismKey || getErrorMechanismKey(entry.tag, entry.info);
                    profile.errorBook[uid] = entry;
                });
                return ensureProgramProfileShape(profile, programId);
            },
            migrateProfile: function(data) {
                if (!data || typeof data !== 'object') {
                    return ensureStudentRecordShape(createProgramProfile(ADVANCED_PROGRAM_ID));
                }
                let profile = this.migrateProgramProfile(data, ADVANCED_PROGRAM_ID);
                profile.programs = {};
                Object.entries(data.programs || {}).forEach(([programId, programData]) => {
                    profile.programs[programId] = this.migrateProgramProfile(programData, programId);
                });
                return ensureStudentRecordShape(profile);
            },
            fallbackLocal: function() {
                this.mode = 'local';
                let k = localStorage.getItem("MathProfile_master_KAI");
                let l = localStorage.getItem("MathProfile_master_Lorik");
                try { this.cache.KAI = this.migrateProfile(JSON.parse(k)); } catch(e) { this.cache.KAI = this.migrateProfile(null); }
                try { this.cache.Lorik = this.migrateProfile(JSON.parse(l)); } catch(e) { this.cache.Lorik = this.migrateProfile(null); }
            },
            getProfile: function(student, programId = getCurrentProgramId()) {
                const record = this.cache[student] || (this.cache[student] = ensureStudentRecordShape(createProgramProfile(ADVANCED_PROGRAM_ID)));
                return getProgramProfile(record, programId, { create: true });
            },

            // 统一写入：1) 本地 localStorage 2) 若连云端，debounce 推到 gist
            forceSave: async function(student) {
                let record = ensureStudentRecordShape(this.cache[student]);
                safeLocalSetItem(`MathProfile_master_${student}`, JSON.stringify(record));
                if (this.mode === 'gist' && GistSync.getToken() && GistSync.getGistId()) {
                    GistSync.pushDebounced(() => ({ KAI: this.cache.KAI, Lorik: this.cache.Lorik }));
                }
            },

            pullRemoteChanges: async function({ render = false, minInterval = 0 } = {}) {
                if (!GistSync.getToken() || !GistSync.getGistId()) return false;
                const now = Date.now();
                if (minInterval && now - this._lastAutoPull < minInterval) return false;
                this._lastAutoPull = now;
                let before = JSON.stringify({ KAI: this.cache.KAI, Lorik: this.cache.Lorik });
                let cloud = await GistSync.pull();
                if (!cloud) return false;
                this.cache.KAI   = mergeProfiles(this.cache.KAI,   this.migrateProfile(cloud.KAI));
                this.cache.Lorik = mergeProfiles(this.cache.Lorik, this.migrateProfile(cloud.Lorik));
                safeLocalSetItem('MathProfile_master_KAI',   JSON.stringify(this.cache.KAI));
                safeLocalSetItem('MathProfile_master_Lorik', JSON.stringify(this.cache.Lorik));
                if (cloud.meta && cloud.meta.lastSetNum && !localStorage.getItem('MathEngine_LastSetNum')) {
                    window.currentSetNumber = cloud.meta.lastSetNum;
                    safeLocalSetItem('MathEngine_LastSetNum', window.currentSetNumber);
                }
                let changed = before !== JSON.stringify({ KAI: this.cache.KAI, Lorik: this.cache.Lorik });
                if (changed && render && typeof window.renderPaper === 'function') window.renderPaper();
                updateCloudStatus();
                return changed;
            },

            // 手动触发立即同步（忽略 debounce）
            syncNow: async function() {
                if (!GistSync.getToken() || !GistSync.getGistId()) {
                    throw new Error('未连接云端');
                }
                // 先拉云端合并一次，避免覆盖另一台设备的新数据
                try {
                    await this.pullRemoteChanges({ render: false });
                } catch(e) { console.warn('拉云端失败:', e); }
                // 再推最终版本
                await GistSync.pushNow({ KAI: this.cache.KAI, Lorik: this.cache.Lorik });
                updateCloudStatus();
            },

            scanLegacyLocalData: function(student) {
                let profile = createProgramProfile(ADVANCED_PROGRAM_ID);
                let historyMap = new Map();
                const oldKeys = ['KAI', 'Lorik', 'v10_KAI', 'v10_Lorik', 'v11_KAI', 'v12_KAI', 'v13_KAI', 'v14_KAI', 'v15_KAI', 'v16_KAI', 'v17_KAI', 'v18_KAI', 'v11_Lorik', 'v12_Lorik', 'v13_Lorik', 'v14_Lorik', 'v15_Lorik', 'v16_Lorik', 'v17_Lorik', 'v18_Lorik'];

                oldKeys.forEach(k => {
                    if (k.includes(student)) {
                        let data = localStorage.getItem(`MathProfile_${k}`);
                        if(data) {
                            try {
                                let parsed = JSON.parse(data);
                                if (!parsed.weights && !parsed.history) {
                                    for (let tag in parsed) {
                                        if (typeof parsed[tag] === 'number') { profile.weights[tag] = Math.max(profile.weights[tag] || 0, parsed[tag]); }
                                    }
                                } else {
                                    if(parsed.weights) Object.assign(profile.weights, parsed.weights);
                                    if(parsed.lastSeen) Object.assign(profile.lastSeen, parsed.lastSeen);
                                    if(parsed.history) parsed.history.forEach(h => historyMap.set(h.set, h));
                                    if(parsed.errorBook) Object.assign(profile.errorBook, parsed.errorBook);
                                }
                            } catch(e) {}
                        }
                    }
                });
                profile.history = Array.from(historyMap.values()).sort((a,b) => a.ts - b.ts);
                return ensureStudentRecordShape(profile);
            },

            // v22：写入时同时维护 errorBook（可回滚的递增计数）
            saveSession: async function(student, records, setNum, programId = getCurrentProgramId()) {
                let profile = ensureProgramProfileShape(this.getProfile(student, programId), programId);
                if (!profile.errorBook) profile.errorBook = {};
                let today = new Date().toLocaleDateString();
                let sessionRecord = { date: today, ts: Date.now(), set: setNum, details: [], allGrades: [], weightAdjustments: [], signalAdjustments: [], signalSnapshot: null, programId };

                const applyWeightDelta = (tag, delta) => {
                    if (!tag || !delta) return;
                    profile.weights[tag] = Math.max(0, (profile.weights[tag] || 0) + delta);
                };
                const applySignalDelta = (field, delta) => {
                    if (!field || !delta) return;
                    profile[field] = Math.max(0, Number(profile[field] || 0) + delta);
                };

                const gradeDelta = (grade) => {
                    if (grade === 'perfect') return -2;
                    if (grade === 'wrong') return 2;
                    return 0;
                };

                let allTagsInSet = [...new Set(records.map(r => r.tag))];
                allTagsInSet.forEach(t => {
                    profile.lastSeen[t] = Math.max(profile.lastSeen[t] || 0, setNum);
                });

                // 若本 set 已提交过，先回滚其对 errorBook 的贡献与 weights
                let existingIndex = profile.history.findIndex(h => h.set === setNum);
                if (existingIndex !== -1) {
                    let old = profile.history[existingIndex];
                    if (old.weightAdjustments && old.weightAdjustments.length) {
                        old.weightAdjustments.forEach(adj => applyWeightDelta(adj.tag, -adj.delta));
                    } else {
                        (old.details || []).forEach(d => {
                            if (d.grade === 'wrong') applyWeightDelta(d.tag, -2);
                        });
                    }
                    (old.details || []).forEach(d => {
                        if (d.uid && profile.errorBook[d.uid]) {
                            let eb = profile.errorBook[d.uid];
                            eb.count -= 1;
                            if (eb.count <= 0) {
                                delete profile.errorBook[d.uid];
                            }
                        }
                    });
                    (old.signalAdjustments || []).forEach(adj => applySignalDelta(adj.field, -adj.delta));
                    profile.history.splice(existingIndex, 1);
                }

                // 应用新记录
                records.forEach(r => {
                    let before = profile.weights[r.tag] || 0;
                    applyWeightDelta(r.tag, gradeDelta(r.grade));
                    let appliedDelta = (profile.weights[r.tag] || 0) - before;
                    sessionRecord.allGrades.push({ tag: r.tag, grade: r.grade });
                    if (appliedDelta !== 0) sessionRecord.weightAdjustments.push({ tag: r.tag, delta: appliedDelta });
                    const signalAdj = getProgramSignalDelta(programId, r.tag, r.grade);
                    if (signalAdj) {
                        const beforeSignal = Number(profile[signalAdj.field] || 0);
                        applySignalDelta(signalAdj.field, signalAdj.delta);
                        const appliedSignalDelta = Number(profile[signalAdj.field] || 0) - beforeSignal;
                        if (appliedSignalDelta !== 0) {
                            sessionRecord.signalAdjustments.push({ field: signalAdj.field, delta: appliedSignalDelta, tag: r.tag });
                        }
                    }

                    if (r.grade !== 'perfect') {

                        sessionRecord.details.push({ tag: r.tag, grade: r.grade, info: r.info, uid, mechanismKey });

                            eb.lastSet = setNum;
                            eb.lastDate = today;
                            eb.mechanismKey = mechanismKey;
                            // 概念错覆盖粗心错（更严重的错误状态优先）

        // ================= 三、 真实遗忘曲线与出题算法 =================
        const TRAINING_LEVELS = {
            1: { name: "L1 基础", desc: "核心技能稳固" },
            2: { name: "L2 熟练", desc: "常规变式与速度" },
            3: { name: "L3 易错", desc: "典型陷阱与辨析" },
            4: { name: "L4 挑战", desc: "综合迁移与策略" }
        };
        const TRAINING_FOCUS_PLAN = {
            1: { goal: "基础巩固", targetLevels: [1, 2], levelText: "L1-L2", principle: "先稳核心技能，再做少量变式。" },
            2: { goal: "陷阱辨析", targetLevels: [2, 3], levelText: "L2-L3", principle: "把易错点夹在常规题中辨认。" },
            3: { goal: "遗忘拦截", targetLevels: [2, 3], levelText: "L2-L3", principle: "唤醒间隔较久的知识点，避免只练新题。" },
            4: { goal: "综合挑战", targetLevels: [3, 4], levelText: "L3-L4", principle: "提高迁移难度，但保留可完成的成功率。" }
        };

        function inferDifficulty(tag) {
            const t = String(tag || '');
            if (/oly|twostep|divisor|unit_fraction|cancel|near_million|paren|reverse/.test(t)) return 4;
            if (/^l_div_decimal_(dividend|both)$/.test(t)) return 3;
            if (/trap|shift|mid0|inner0|100k|all0|jump0|tiny|decimal_q|near100|ofwhole|125|fd|muldiv|dist|merge/.test(t)) return 3;
            if (/basic|pure|norm|3x20|scale10|order|move|coeff/.test(t) || /^k_conv_[1256]$/.test(t) || /^l_conv_[124]$/.test(t)) return 1;
            if (/^l_conv_[5678]$/.test(t) || /^k_conv_(4|8|9|10)$/.test(t)) return 3;
            if (/conv|25|addsub|scale|int|cross|6digit|prop/.test(t)) return 2;
            return 2;
        }

        function phaseLevelBonus(cycleCode, level) {
            const target = {
                1: [1, 2],
                2: [2, 3],
                3: [2, 3],
                4: [3, 4]
            }[cycleCode] || [2, 3];
            if (target.includes(level)) return 0.45;
            return -0.15 * Math.abs(level - target[0]);
        }

        function getTrainingFocus(cycleCode) {
            return TRAINING_FOCUS_PLAN[cycleCode] || TRAINING_FOCUS_PLAN[1];
        }

        window.TRAINING_LEVELS = TRAINING_LEVELS;
        window.TRAINING_FOCUS_PLAN = TRAINING_FOCUS_PLAN;
        window.inferDifficulty = inferDifficulty;
        window.getTrainingFocus = getTrainingFocus;

        const Engine = {
            randInt: (min, max) => Math.floor(random() * (max - min + 1)) + min,
            randChoice: (arr) => arr[Math.floor(random() * arr.length)],
            shuffle: (array) => {
                let newArr = [...array]; let curr = newArr.length, rnd;
                while (curr != 0) { rnd = Math.floor(random() * curr); curr--; [newArr[curr], newArr[rnd]] = [newArr[rnd], newArr[curr]]; }
                return newArr;
            },
            gcd: (a, b) => { a = Math.abs(a); b = Math.abs(b); if (b === 0) return a; return Engine.gcd(b, a % b); },
            getCycleState: () => {
                const c = window.currentSetNumber % 7;
                if(c===1 || c===2) return { code: 1, label: "[Phase: New Concept Consolidation]" };
                if(c===3 || c===5) return { code: 2, label: "[Phase: Trap Avoidance]" };
                if(c===4) return { code: 3, label: "[Phase: Forgetting Curve Interception]" };
                if(c===6 || c===0) return { code: 4, label: "[Phase: Extreme Challenge]" };
                return { code: 1, label: "[Phase: Foundation Building]" };
            },
            getFocusPlan: () => {
                const cycle = Engine.getCycleState();
                return { ...getTrainingFocus(cycle.code), code: cycle.code, phaseLabel: cycle.label };
            },
            // v22.1 反套路增强：
            // 1. 题面字符串跨卷去重（避免数字巧合撞题）
            // 2. 池内选择增加大幅随机扰动，防止同一 tag 组合总在固定位置
            // 3. 生成失败时回退到其他 tag，而不是强行重复
            weightedSelect: (pool, student, count) => {
                let profile = StorageDB.getProfile(student);
                let currentSet = window.currentSetNumber;
                let cycle = Engine.getCycleState();
                let recent = window._recentQuestions || new Set();
                let usedThisPaper = window._paperQuestions || new Set();

                let scoredPool = pool.map(item => {
                    let level = item.level || inferDifficulty(item.tag);
                    let weight = profile.weights[item.tag] || 0;
                    let lastSeenSet = profile.lastSeen[item.tag] || 0;
                    let setsSinceSeen = currentSet - lastSeenSet;
                    if (lastSeenSet === 0) setsSinceSeen = 5;
                    let forgettingBonus = Math.min(setsSinceSeen * 0.15, 1.5);
                    let errorSignal = getErrorBookSignal(profile, item.tag);
                    let errorBookBonus = Math.min(errorSignal.score * 0.12, 1.1);
                    let domainSignal = getDomainSignal(profile, item.tag);
                    let domainBonus = Math.min(domainSignal.score * 0.08, 0.75);
                    let highValueSignal = getHighValueTrainingSignal(profile, item.tag);
                    let highValueBonus = Math.min(highValueSignal.score * (cycle.code === 3 ? 0.18 : 0.13), 1.2);
                    // 随机扰动占主导（权重 1.4），避免 tag 顺序固定
                    let score = random() * 1.2 + (weight * 0.5) + forgettingBonus * 0.7 + errorBookBonus + domainBonus + highValueBonus + phaseLevelBonus(cycle.code, level);
                    let selectReason = 'random';
                    const shouldReplay = errorSignal.exactEntries.length > 0 && (
                        errorSignal.exactCount >= 2 ||
                        cycle.code === 3 ||
                        (highValueSignal.priority && random() < 0.7) ||
                        random() < 0.45
                    );
                    if (shouldReplay) selectReason = 'replay';
                    else if (errorSignal.exactEntries.length > 0 && (highValueSignal.priority || random() < 0.6)) selectReason = 'variant';
                    else if (highValueSignal.priority && (weight > 0 || domainBonus >= 0.2 || forgettingBonus > 0.75)) selectReason = 'focus';
                    else if (weight > 0 && (weight * 0.5) >= Math.max(forgettingBonus * 0.7, domainBonus)) selectReason = 'weak';
                    else if (domainBonus >= 0.35) selectReason = 'domain';
                    else if (forgettingBonus > 0.8) selectReason = 'forget';
                    return { item, score, weight, level, errorSignal, errorBookBonus, domainBonus, highValueSignal, highValueBonus, selectReason };
                });
                scoredPool.sort((a, b) => b.score - a.score);

                let selected = [];
                let maxWeak = Math.ceil(count * 0.45); let weakCount = 0;
                let maxReplay = Math.max(1, Math.floor(count * 0.25)); let replayCount = 0;
                let maxChallenge = cycle.code === 4 ? Math.ceil(count * 0.5) : Math.max(1, Math.floor(count * 0.25));
                let challengeCount = 0;
                for (let p of scoredPool) {
                    if (selected.length >= count) break;
                    if (p.selectReason === 'replay' && replayCount >= maxReplay) p.selectReason = 'variant';
                    const isWeak = p.weight > 0;
                    const isChallenge = p.level >= 4;
                    if (isWeak && weakCount >= maxWeak) continue;
                    if (isChallenge && challengeCount >= maxChallenge && p.weight < 3) continue;
                    selected.push(p);
                    if (p.selectReason === 'replay') replayCount++;
                    if (isWeak) weakCount++;
                    if (isChallenge) challengeCount++;
                }
                if (selected.length < count) {
                    for (let p of scoredPool) { if (selected.length >= count) break; if (!selected.includes(p)) selected.push(p); }
                }

                // 生成阶段：每道题最多重试 15 次避免撞已出过的题面
                let result = selected.map(x => {
                    let genItem = null;
                    if (x.selectReason === 'replay' && x.errorSignal?.exactEntries?.length) {
                        const entry = pickErrorReplayEntry(x.errorSignal.exactEntries);
                        if (entry && !usedThisPaper.has(entry.info.q)) genItem = buildErrorReplayItem(entry);
                    }
                    if (!genItem && x.selectReason === 'variant' && x.errorSignal?.exactEntries?.length) {
                        const entry = pickErrorReplayEntry(x.errorSignal.exactEntries);
                        if (entry) {
                            genItem = buildErrorVariantItem(entry, () => x.item.gen());
                            if (genItem?.q && recent.has(genItem.q)) genItem = null;
                        }
                    }
                    if (!genItem) {
                        for (let t = 0; t < 15; t++) {
                            let candidate = x.item.gen();
                            if (!candidate || !candidate.q) continue;
                            if (!recent.has(candidate.q) && !usedThisPaper.has(candidate.q)) {
                                genItem = candidate; break;
                            }
                            // 兜底：就算仍有冲突，至少保留最后一次结果
                            genItem = candidate;
                        }
                    }
                    genItem.reason = genItem.isErrorReplay ? 'replay' : (genItem.isErrorVariant ? 'variant' : x.selectReason);
                    genItem.level = x.level;
                    genItem.levelName = TRAINING_LEVELS[x.level]?.name || `L${x.level}`;
                    genItem = attachQualityMetadata(genItem);
                    usedThisPaper.add(genItem.q);
                    return genItem;
                });
                return Engine.shuffle(result);
            }
        };

        function collectRecentQuestions(lookbackSets = 8) {

        function selectClosureFocus(student, phaseKey = 'integration') {
            const profile = StorageDB.getProfile(student, CLOSURE_PROGRAM_ID) || createProgramProfile(CLOSURE_PROGRAM_ID);

            const recentCounts = getClosureRecentGapCounts(profile);
            const phaseBias = getClosureFocusBias(phaseKey);
            const ranked = PROGRAM_SIGNAL_FIELDS.map((field, index) => {
                const signal = Number(profile[field] || 0);
                const score = signal * 2.4
                    + errorCounts[field] * 1.5
                    + recentCounts[field] * 1.2
                    + phaseBias[field]
                    + (CLOSURE_FOCUS_PRIORITY_BOOST[field] || 0)
                    - index * 0.01;
                return { field, score };
            }).sort((a, b) => b.score - a.score);
            const chosen = ranked[0]?.field || 'methodGap';
            return {
                field: chosen,
                score: ranked[0]?.score || 0,
                ...CLOSURE_FOCUS_CONFIG[chosen]

        function buildClosureFocusReplayItem(entry, usedThisPaper = new Set(), recent = new Set()) {
            if (!entry?.tag) return null;
            const replayLevel = getReplayLevel(entry);
            const exactAllowed = !!entry?.info?.q
                && !usedThisPaper.has(entry.info.q)
                && (replayLevel === 'L1' || !recent.has(entry.info.q));
            const exactItem = exactAllowed ? buildErrorReplayItem(entry) : null;
            let variantItem = buildErrorVariantItem(entry, () => buildClosureC2Variant(entry, '[重点强化 Focus Variant] '));
            if (variantItem && (usedThisPaper.has(variantItem.q) || recent.has(variantItem.q))) {
                variantItem = null;
            }
            let boundaryItem = buildClosureBoundaryReplayItem(entry);
            if (boundaryItem) {
                boundaryItem = attachQualityMetadata(boundaryItem);
            }
            if (boundaryItem && (usedThisPaper.has(boundaryItem.q) || recent.has(boundaryItem.q))) {
                boundaryItem = null;
            }

            let chosen = null;
            let closureFocusMode = '';
            if (replayLevel === 'L1') {
                chosen = exactItem || variantItem;
                closureFocusMode = chosen?.isErrorReplay ? 'L1_exact' : 'L1_variant';
            } else if (replayLevel === 'L2') {
                chosen = variantItem || exactItem;
                closureFocusMode = chosen?.isErrorVariant ? 'L2_variant' : 'L2_exact';
            } else {
                chosen = boundaryItem || variantItem || exactItem;
                closureFocusMode = chosen === boundaryItem ? 'L3_boundary' : (chosen?.isErrorVariant ? 'L3_variant' : 'L3_exact');
            }
            if (!chosen) return null;
            return attachQualityMetadata({
                ...chosen,
                replayLevel,
                isClosureFocusReplay: true,
                closureFocusMode,
                reason: chosen?.isErrorReplay ? 'replay' : 'variant'
            });
        }

        function injectClosureFocusReview(student, focusMeta, focusItems) {
            if (!focusMeta?.field || focusMeta.field === 'legacyMix') return focusItems;
            const entries = getClosureFocusEntries(student, focusMeta.field);
            if (!entries.length) return focusItems;
            const chosen = pickErrorReplayEntry(entries);
            if (!chosen) return focusItems;
            const usedThisPaper = window._paperQuestions || new Set();
            const recent = window._recentQuestions || new Set();
            const nextItems = [...focusItems];
            const replaceAt = Math.max(0, nextItems.length - 1);
            const focusReplayItem = buildClosureFocusReplayItem(chosen, usedThisPaper, recent);
            if (focusReplayItem) {
                nextItems[replaceAt] = focusReplayItem;
                usedThisPaper.add(focusReplayItem.q);
                return Engine.shuffle(nextItems);
            }
            return focusItems;
        }

        function trimClosureBridgeItems(items = [], phaseKey = 'integration') {
            const targetsByPhase = {
                foundation: {
                    representation_conversion: 2,
                    baseline_comparison: 2,
                    representation_choice: 1,
                    post_conversion_use: 1
                },
                integration: {
                    representation_conversion: 1,
                    baseline_comparison: 1,
                    representation_choice: 2,
                    post_conversion_use: 2
                },
                graduation: {
                    representation_conversion: 1,
                    baseline_comparison: 2,
                    representation_choice: 1,
                    post_conversion_use: 2
                }
            };
            const targets = targetsByPhase[phaseKey] || targetsByPhase.integration;
            const buckets = {
                representation_conversion: [],
                baseline_comparison: [],
                representation_choice: [],
                post_conversion_use: []
            };
            (items || []).forEach(item => {
                const lane = item?.bridgeLane;
                if (buckets[lane]) buckets[lane].push(item);
            });
            const chosen = [];
            const used = new Set();
            Object.entries(targets).forEach(([lane, count]) => {
                (buckets[lane] || []).slice(0, count).forEach(item => {
                    chosen.push(item);
                    used.add(item);
                });
            });
            (items || []).forEach(item => {
                if (chosen.length >= 6) return;
                if (used.has(item)) return;
                chosen.push(item);
            });
            return Engine.shuffle(chosen.slice(0, 6));
        }

        // v22.1 每个 section 独立洗牌：即便题目不变，位置也不会形成固定套路
        function sectionShuffle(arr, sectionSalt) {
            let local = [...arr];
            // salt 独立于全局 PRNG，避免污染后续生成
            let s = ((window.currentSetNumber * 2654435761) ^ (sectionSalt * 1597334677)) >>> 0;
            let rand = () => {
                s = Math.imul(s ^ (s >>> 15), s | 1) >>> 0;
                s = (s ^ s + Math.imul(s ^ (s >>> 7), s | 61)) >>> 0;
                return ((s ^ (s >>> 14)) >>> 0) / 0x100000000;
            };
            for (let i = local.length - 1; i > 0; i--) {
                let j = Math.floor(rand() * (i + 1));
                [local[i], local[j]] = [local[j], local[i]];
            }
            return local;
        }

        // ================= v22 重写：错题本渲染（独立存储 · 去重计数 · 分组 · 一键掌握） =================
        window._ebFilter = 'active'; // 'active' | 'mastered'

        function renderErrorBookInternal() {

        function buildErrorBookMechanismChips(summary = {}, activeMechanism = '') {
            const items = Object.values(summary)
                .sort((a, b) => b.count - a.count)
                .slice(0, 4);
            if (!items.length) return '';
            const chips = items.map(item => `
                <button
                    class="eb-filter-btn ${activeMechanism === item.key ? 'active' : ''}"
                    style="padding:6px 10px; border-radius:999px; font-size:12.5px;"
                    onclick="window.setEbMechanism('${item.key}')"
                >${getErrorMechanismLabel(item.key)} · ${item.count}</button>
            `).join('');
            return `
                <div style="margin-top:8px;">
                    <div style="color:#64748b; font-size:12.5px; margin-bottom:8px;">高频机制：</div>
                    <div style="display:flex; flex-wrap:wrap; gap:8px;">
                        ${chips}
                        ${activeMechanism ? `<button class="eb-filter-btn" style="padding:6px 10px; border-radius:999px; font-size:12.5px;" onclick="window.setEbMechanism('')">查看全部</button>` : ''}
                    </div>
                </div>`;
        }

        function getErrorBookMechanismEntries(student, mechanismKey, { includeMastered = false } = {}) {
            const profile = StorageDB.getProfile(student) || {};
            const entries = Object.entries(profile.errorBook || {}).map(([uid, value]) => ({ uid, ...value }));
            return entries
                .filter(entry => includeMastered || !entry.mastered)
                .filter(entry => {
                    const key = entry.mechanismKey || getErrorMechanismKey(entry.tag, entry.info);
                    return key === mechanismKey;
                })
                .sort((a, b) => (b.count || 1) - (a.count || 1) || (b.lastSet || 0) - (a.lastSet || 0));
        }

        function buildErrorBookMechanismPracticeItems(student, mechanismKey) {
            const entries = getErrorBookMechanismEntries(student, mechanismKey);
            if (!entries.length) return [];
            const picked = entries.slice(0, 6);
            return picked.map(entry => {
                const built = buildErrorVariantItem(entry, () => buildErrorReplayItem(entry)) || buildErrorReplayItem(entry);
                if (!built) return null;
                return {
                    ...built,
                    followupFamily: getSetReviewFollowupFamily(entry.tag, entry.info),
                    followupGrade: entry.grade || 'wrong',
                    followupMechanismKey: mechanismKey,
                    isMechanismFollowup: true
                };
            }).filter(Boolean);
        }

        function buildErrorBookMechanismPrintHTML(student, mechanismKey, includeAnswers = false) {
            const items = buildErrorBookMechanismPracticeItems(student, mechanismKey);
            if (!items.length) return '';
            const label = getErrorMechanismLabel(mechanismKey);
            const families = Array.from(new Set(items.map(item => SET_REVIEW_FOLLOWUP_LABELS[item.followupFamily] || '同类跟训'))).join('、');
            const printPack = getSetReviewFollowupPrintPack(items);
            const answerBlock = includeAnswers ? buildSetReviewFollowupAnswerHTML(items, { forPrint: true }) : '';
            return `
            <section class="set-review-followup-print-shell" data-pack="${printPack}">
                <header class="booklet-meta-band">
                    <span>${student} · Error Book</span>

                ${answerBlock}
            </section>`;
        }
        window.buildErrorBookMechanismPrintHTML = buildErrorBookMechanismPrintHTML;

        function buildStudentErrorSection(name, profile, filter) {
            let eb = (profile && profile.errorBook) ? profile.errorBook : {};
            let allEntries = Object.entries(eb).map(([uid, v]) => ({ uid, ...v }));
            let activeEntries = allEntries.filter(e => !e.mastered);
            let masteredEntries = allEntries.filter(e => e.mastered);
            let entries = filter === 'mastered' ? masteredEntries : activeEntries;
            const activeMechanism = window._ebMechanism || '';
            let mechanismSummary = entries.reduce((acc, entry) => {
                const key = entry.mechanismKey || getErrorMechanismKey(entry.tag, entry.info);
                const current = acc[key] || { key, count: 0 };
                current.count += Math.max(1, entry.count || 1);
                acc[key] = current;
                return acc;
            }, {});
            const mechanismChipHtml = buildErrorBookMechanismChips(mechanismSummary, activeMechanism);
            if (activeMechanism) {
                entries = entries.filter(entry => {
                    const key = entry.mechanismKey || getErrorMechanismKey(entry.tag, entry.info);
                    return key === activeMechanism;
                });
            }

            let filterTitle = filter === 'mastered'
                ? `🏆 ${name} 已掌握错题（Mastered Archive）`
                : `📓 ${name} 专属错题本（Active Error Book）`;

            if (entries.length === 0) {
                let msg = filter === 'mastered'
                    ? '🎯 还没有已掌握的错题，加油攻克当前错题吧！'
                    : '🎉 太棒了！当前没有活跃错题！(No active errors!)';
                if (activeMechanism) {
                    msg = `当前没有「${getErrorMechanismLabel(activeMechanism)}」机制的${filter === 'mastered' ? '已掌握' : '活跃'}错题。`;
                }
                return `<div class="sheet"><div class="header"><h1>${filterTitle}</h1></div>
                    <div class="eb-summary"><div class="eb-stat"><span><b>${activeEntries.length}</b> 待攻克</span><span><b>${masteredEntries.length}</b> 已掌握</span></div>
                    <div style="display:flex; gap:8px;">
                        <button class="eb-filter-btn ${filter === 'active' ? 'active' : ''}" onclick="window.setEbFilter('active')">待攻克</button>
                        <button class="eb-filter-btn ${filter === 'mastered' ? 'active' : ''}" onclick="window.setEbFilter('mastered')">已掌握</button>
                    </div>${mechanismChipHtml}${activeMechanism ? `<div style="margin-top:8px; color:#0f172a; font-size:13px;">当前只看：<strong>${getErrorMechanismLabel(activeMechanism)}</strong></div>` : ''}</div>
                    <h2 style="text-align:center; margin-top:50px; color:#4caf50;">${msg}</h2></div>`;
            }

            // 按 tag 分组，组内按 count 降序再按 lastSet 降序
            let byTag = {};
            entries.forEach(e => {
                if (!byTag[e.tag]) byTag[e.tag] = [];
                byTag[e.tag].push(e);
            });
            // tag 按组内总错次降序
            let sortedTags = Object.keys(byTag).sort((a, b) => {
                let sa = byTag[a].reduce((s, x) => s + x.count, 0);
                let sb = byTag[b].reduce((s, x) => s + x.count, 0);
                return sb - sa;
            });
            Object.keys(byTag).forEach(t => byTag[t].sort((a, b) => b.count - a.count || b.lastSet - a.lastSet));

            // 每页最多 8 张错题卡（每个分组标题占一行 col-span all）
            // 为简化分页：把 [tagHeader, ...cards] 序列化后按 8 卡一页切分
            let flatItems = [];
            sortedTags.forEach(tag => {
                flatItems.push({ type: 'header', tag, total: byTag[tag].reduce((s, x) => s + x.count, 0), kinds: byTag[tag].length });
                byTag[tag].forEach(e => flatItems.push({ type: 'card', entry: e }));
            });

            // 分页：每页最多 N 个卡片（header 不占卡片名额但占网格一行）
            const cardsPerPage = 8;
            let pages = [];
            let cur = []; let cardCount = 0;
            flatItems.forEach(it => {
                if (it.type === 'card') {
                    if (cardCount >= cardsPerPage) { pages.push(cur); cur = []; cardCount = 0; }
                    cur.push(it); cardCount++;
                } else {
                    cur.push(it);
                }
            });
            if (cur.length) pages.push(cur);

            let html = '';
            pages.forEach((pageItems, pageIdx) => {
                let innerHtml = pageItems.map(it => {
                    if (it.type === 'header') {
                        let kb = getKnowledgeTip(it.tag);
                        return `<div class="eb-tag-header"><span>🎯 ${kb.name} <span style="opacity:0.7; font-size:12px; margin-left:6px;">[${it.tag}]</span></span><span class="tag-count">${it.kinds} 题 / 累计 ${it.total} 次</span></div>`;
                    } else {

        function findSetSession(profile, setNum) {
            return (profile?.history || []).slice().reverse().find(session => session.set === setNum) || null;
        }

        const SET_REVIEW_FOLLOWUP_LABELS = {
            decimal_division: '小数除法',
            fraction_operation: '分数运算',
            conversion_bridge: '互化比较',
            complex_mixed: '复杂混合',
            unit_rate_speed: '单位比率',
            equation_method: '方程方法',
            validation_estimation: '估算检验',
            generic_followup: '同类跟训'
        };

        function getSetReviewFollowupFamily(tag, info = {}) {
            const qualityFamily = getQualityFamilyForTag(tag || '');
            if (qualityFamily) return qualityFamily;
            const source = `${tag || ''} ${info?.q || ''} ${info?.step || ''}`;
            if (/div|division|除/.test(source)) return 'decimal_division';
            if (/frac|fraction|分数/.test(source)) return 'fraction_operation';
            if (/conv|percent|compare|互化|百分/.test(source)) return 'conversion_bridge';
            if (/unit|rate|speed|单位|速度|比率/.test(source)) return 'unit_rate_speed';
            if (/eq|equation|方程/.test(source)) return 'equation_method';
            if (/est|验算|估算|合理/.test(source)) return 'validation_estimation';
            return 'generic_followup';
        }

        function buildSetReviewFollowupCandidates(session) {
            return (session?.details || []).map((detail, index) => {
                const info = detail.info || {};
                return {
                    id: `${detail.uid || detail.tag || 'mistake'}-${index}`,
                    uid: detail.uid || computeErrorUid(detail.tag, info.q || ''),
                    tag: detail.tag,
                    grade: detail.grade,
                    info,
                    mechanismKey: detail.mechanismKey || getErrorMechanismKey(detail.tag, info),
                    family: getSetReviewFollowupFamily(detail.tag, info),
                    severity: detail.grade === 'wrong' ? 2 : 1
                };
            });
        }

        function buildSetReviewFollowupTargets(session) {
            const grouped = new Map();
            buildSetReviewFollowupCandidates(session).forEach(candidate => {
                const key = `${candidate.uid || candidate.tag || candidate.family}:${candidate.grade}`;
                const bucket = grouped.get(key) || {
                    tag: candidate.tag || '',
                    family: candidate.family,
                    grade: candidate.grade,
                    mechanismKey: candidate.mechanismKey || '',
                    sourceItems: []
                };
                bucket.sourceItems.push(candidate);
                grouped.set(key, bucket);
            });
            return Array.from(grouped.values()).sort((a, b) => {
                const severityA = a.grade === 'wrong' ? 2 : 1;
                const severityB = b.grade === 'wrong' ? 2 : 1;
                return severityB - severityA || b.sourceItems.length - a.sourceItems.length;
            });
        }

        function buildGenericSetReviewVariant(target) {
            const entry = target?.sourceItems?.[0];
            const tip = getKnowledgeTip(entry?.tag || '');
            const source = `${entry?.tag || ''} ${entry?.info?.q || ''} ${entry?.info?.step || ''}`;
            if (/class="frac"|fraction|分数/.test(source)) {
                const left = new Frac(Engine.randChoice([3, 5, 7]), Engine.randChoice([4, 6, 8]));
                const right = new Frac(Engine.randChoice([1, 2, 3]), Engine.randChoice([2, 4, 5]));
                const ans = left.sub(right);
                return attachQualityMetadata({
                    tag: entry?.tag || '',
                    q: `${left.toHTML()} &minus; ${right.toHTML()} =`,
                    a: ans.toMixedHTML(),
                    step: `方法提醒：先看要不要通分，再减，最后别忘记化成最简。${tip.advice || ''}`,
                    qualityFamily: target?.family || 'fraction_operation',
                    replayLevel: target?.grade === 'wrong' ? 'L2' : 'L1',
                    isSetReviewFollowup: true,
                    isReviewItem: true
                });
            }
            if (/%|percent|ratio|比|互化/.test(source)) {
                const values = [
                    { q: `25% + 0.5 = (   )`, a: '0.75', step: '方法提醒：先把 25% 化成 0.25，再和 0.5 相加。' },
                    { q: `0.4 = (   )% = (   )`, a: `40% ，${new Frac(2, 5).toHTML()}`, step: '方法提醒：先统一表示，再写成题目要求的形式。' },
                    { q: `在 0.6、70%、${new Frac(5, 8).toHTML()} 里，最接近 1 的是<div class="blank"></div>`, a: '70%', step: '方法提醒：先统一想成小数，再判断谁更接近 1。' }
                ];
                const selected = Engine.randChoice(values);
                return attachQualityMetadata({
                    tag: entry?.tag || '',
                    ...selected,
                    qualityFamily: target?.family || 'conversion_bridge',
                    replayLevel: target?.grade === 'wrong' ? 'L2' : 'L1',
                    isSetReviewFollowup: true,
                    isReviewItem: true
                });
            }
            if (/eq|equation|方程|<i\.var>|x/.test(source)) {
                return attachQualityMetadata({
                    tag: entry?.tag || '',
                    q: `<i class="var">x</i> &divide; 4 = 3.5`,
                    a: '14',
                    step: `方法提醒：先想被除数 = 商 × 除数，再回代检查。${tip.advice || ''}`,
                    qualityFamily: target?.family || 'equation_method',
                    replayLevel: target?.grade === 'wrong' ? 'L2' : 'L1',
                    isSetReviewFollowup: true,
                    isReviewItem: true
                });
            }
            if (/unit|rate|speed|单位|速度|平均|单价|折扣|元|km|cm|kg|g/.test(source)) {
                const pool = [
                    { q: `1.8 km = (   ) m`, a: '1800', step: '规则提醒：先统一单位，再开始算。' },
                    { q: `每支 7.5 元，买 4 支，一共 (   ) 元`, a: '30', step: '方法提醒：先认出“每支”表示单价，再用单价 × 数量。' },
                    { q: `90 km/h 跑 1.5 h，路程是 (   ) km`, a: '135', step: '方法提醒：先认出这是速度关系：路程 = 速度 × 时间。' }
                ];
                const selected = Engine.randChoice(pool);
                return attachQualityMetadata({
                    tag: entry?.tag || '',
                    ...selected,
                    qualityFamily: target?.family || 'unit_rate_speed',
                    replayLevel: target?.grade === 'wrong' ? 'L2' : 'L1',
                    isSetReviewFollowup: true,
                    isReviewItem: true
