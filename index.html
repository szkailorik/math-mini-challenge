                            replayLevel: target.grade === 'wrong' ? 'L2' : 'L1',
                            isSetReviewFollowup: true,
                            isReviewItem: true
                        });
                    }
                    case 'l_conv_3': {
                        const n = Engine.randChoice([1, 3, 7, 9, 11, 13, 17, 19]);
                        return attachQualityMetadata({
                            tag: entry.tag,
                            q: `<div class="frac"><span>${n}</span><span class="bottom">20</span></div> = (   )`,
                            a: formatDecimal(n / 20),
                            step: '方法提醒：分母 20 先化成 100，再写成小数。',
                            qualityFamily: 'conversion_bridge',
                            replayLevel: target.grade === 'wrong' ? 'L2' : 'L1',
                            isSetReviewFollowup: true,
                            isReviewItem: true
                        });
                    }
                    case 'l_conv_2':
                    case 'l_conv_4': {
                        const built = entry.tag === 'l_conv_2'
                            ? { q: `0.375 = (   )`, a: new Frac(3, 8).toHTML(), step: '方法提醒：先写成分母 1000 的分数，再约分。' }
                            : { q: `0.45 = (   )`, a: new Frac(9, 20).toHTML(), step: '方法提醒：先写成分母 100 的分数，再约分。' };
                        return attachQualityMetadata({
                            tag: entry.tag,
                            ...built,
                            qualityFamily: 'conversion_bridge',
                            replayLevel: target.grade === 'wrong' ? 'L2' : 'L1',
                            isSetReviewFollowup: true,
                            isReviewItem: true
                        });
                    }
                }
            }
            if (/^l_conv_[5-8]$/.test(entry.tag || '')) {
                const configs = {
                    l_conv_5: { left: new Frac(4, 5).toHTML(), benchmark: 0.8, values: [0.79, 0.81, 0.78, 0.82] },
                    l_conv_6: { left: new Frac(1, 2).toHTML(), benchmark: 0.5, values: [0.49, 0.48, 0.51, 0.52] },
                    l_conv_7: { left: new Frac(5, 8).toHTML(), benchmark: 0.625, values: [0.62, 0.63, 0.61, 0.64] },
                    l_conv_8: { left: new Frac(3, 4).toHTML(), benchmark: 0.75, values: [0.74, 0.73, 0.76, 0.77] }
                };
                const config = configs[entry.tag];
                const right = Engine.randChoice(config.values);
                const symbol = config.benchmark > right ? '&gt;' : '&lt;';
                return attachQualityMetadata({
                    tag: entry.tag,
                    q: `${config.left}<span class="circle-blank"></span>${right.toFixed(2)}`,
                    a: symbol,
                    step: `方法提醒：先把分数化成小数 ${formatDecimal(config.benchmark)}，再和 ${right.toFixed(2)} 逐位比较。`,
                    qualityFamily: 'conversion_bridge',
                    replayLevel: target.grade === 'wrong' ? 'L2' : 'L1',
                    isSetReviewFollowup: true,
                    isReviewItem: true
                });
            }
            const built = buildErrorVariantItem({ ...entry, count: Math.max(2, target?.sourceItems?.length || 2) });
            if (built) return { ...built, isSetReviewFollowup: true };
            const decimal = Engine.randChoice([0.125, 0.2, 0.25, 0.375, 0.625, 0.75]);
            const fractionMap = {
                0.125: new Frac(1, 8).toHTML(),
                0.2: new Frac(1, 5).toHTML(),
                0.25: new Frac(1, 4).toHTML(),
                0.375: new Frac(3, 8).toHTML(),
                0.625: new Frac(5, 8).toHTML(),
                0.75: new Frac(3, 4).toHTML()
            };
            return attachQualityMetadata({
                tag: entry.tag,
                q: `${decimal} = (   )% = (   )`,
                a: `${decimal * 100}% ，${fractionMap[decimal]}`,
                step: '方法提醒：先统一形式，再写成题目要求的表示法。',
                qualityFamily: 'conversion_bridge',
                replayLevel: target.grade === 'wrong' ? 'L2' : 'L1',
                isSetReviewFollowup: true,
                isReviewItem: true
            });
        }

        function buildSetReviewEquationVariant(target) {
            const entry = target?.sourceItems?.[0] || {};
            if (/^c2_eq_/.test(entry.tag || '')) {
                const built = target.grade === 'wrong'
                    ? buildClosureBoundaryReplayItem(entry)
                    : buildClosureC2Variant(entry, '[本套变式 Follow-up] ');
                if (built) {
                    return attachQualityMetadata({
                        ...built,
                        qualityFamily: 'equation_method',
                        replayLevel: target.grade === 'wrong' ? 'L2' : 'L1',
                        isSetReviewFollowup: true,
                        isReviewItem: true
                    });
                }
            }
            const built = buildKaiEquationVariant(entry.tag || 'k_eq_twostep', '[本套变式 Follow-up] ');
            return built
                ? attachQualityMetadata({
                    ...built,
                    qualityFamily: 'equation_method',
                    replayLevel: target.grade === 'wrong' ? 'L2' : 'L1',
                    isSetReviewFollowup: true,
                    isReviewItem: true
                })
                : buildGenericSetReviewVariant(target);
        }

        function buildSetReviewUnitRateVariant(target) {
            const entry = target?.sourceItems?.[0] || {};
            if (/^(c2_unit_|c2_rate_|c2_speed_)/.test(entry.tag || '')) {
                const built = target.grade === 'wrong'
                    ? buildClosureBoundaryReplayItem(entry)
                    : buildClosureC2Variant(entry, '[本套变式 Follow-up] ');
                if (built) {
                    return attachQualityMetadata({
                        ...built,
                        qualityFamily: getSetReviewFollowupFamily(entry.tag, entry.info || {}),
                        replayLevel: target.grade === 'wrong' ? 'L2' : 'L1',
                        isSetReviewFollowup: true,
                        isReviewItem: true
                    });
                }
            }
            const pool = [
                { q: `2.4 km = (   ) m`, a: '2400', step: '规则提醒：先统一单位，再开始算。' },
                { q: `每本 12 元，买 5 本，一共 (   ) 元`, a: '60', step: '方法提醒：先找单价和数量，再求总价。' },
                { q: `60 km/h 跑 2.5 h，路程是 (   ) km`, a: '150', step: '方法提醒：先想路程 = 速度 × 时间。' }
            ];
            const selected = Engine.randChoice(pool);
            return attachQualityMetadata({
                tag: entry.tag,
                ...selected,
                qualityFamily: 'unit_rate_speed',
                replayLevel: target.grade === 'wrong' ? 'L2' : 'L1',
                isSetReviewFollowup: true,
                isReviewItem: true
            });
        }

        function buildSetReviewValidationVariant(target) {
            const entry = target?.sourceItems?.[0] || {};
            if (/^c2_est_/.test(entry.tag || '')) {
                const built = target.grade === 'wrong'
                    ? buildClosureBoundaryReplayItem(entry)
                    : buildClosureC2Variant(entry, '[本套变式 Follow-up] ');
                if (built) {
                    return attachQualityMetadata({
                        ...built,
                        qualityFamily: 'validation_estimation',
                        replayLevel: target.grade === 'wrong' ? 'L2' : 'L1',
                        isSetReviewFollowup: true,
                        isReviewItem: true
                    });
                }
            }
            const pool = [
                { q: `4.8 ÷ 0.6 的商应该比 1 大还是小？`, a: '大于 1', step: '检验提醒：先判断数量级，再看结果合不合理。' },
                { q: `0.25 × 0.4 的结果会不会大于 1？`, a: '不会', step: '检验提醒：两个都小于 1，相乘结果通常更小。' }
            ];
            const selected = Engine.randChoice(pool);
            return attachQualityMetadata({
                tag: entry.tag,
                ...selected,
                qualityFamily: 'validation_estimation',
                replayLevel: target.grade === 'wrong' ? 'L2' : 'L1',
                isSetReviewFollowup: true,
                isReviewItem: true
            });
        }

        function buildSetReviewVariantQuestion(target, student, programId) {
            const entry = target?.sourceItems?.[0] || {};
            if (target.family === 'decimal_division') {
                const built = buildErrorVariantItem({ ...entry, count: Math.max(2, target?.sourceItems?.length || 2) });
                if (built) return { ...built, isSetReviewFollowup: true };
                const kaiBuilt = buildKaiDecimalDivisionVariant(entry.tag || 'k_ddiv_shift', '[本套变式 Follow-up] ');
                if (kaiBuilt) {
                    return attachQualityMetadata({
                        ...kaiBuilt,
                        qualityFamily: 'decimal_division',
                        replayLevel: target.grade === 'wrong' ? 'L2' : 'L1',
                        isSetReviewFollowup: true,
                        isReviewItem: true
                    });
                }
            }
            if (target.family === 'fraction_operation') return buildSetReviewFractionVariant(target);
            if (target.family === 'conversion_bridge') return buildSetReviewConversionVariant(target);
            if (target.family === 'complex_mixed') return buildSetReviewComplexMixedVariant(target);
            if (target.family === 'equation_method') return buildSetReviewEquationVariant(target);
            if (target.family === 'unit_rate_speed') return buildSetReviewUnitRateVariant(target);
            if (target.family === 'validation_estimation') return buildSetReviewValidationVariant(target);
            return buildGenericSetReviewVariant(target);
        }

        function buildSetReviewFollowupItems(session, student, programId) {
            const targets = buildSetReviewFollowupTargets(session);
            const items = [];
            targets.forEach(target => {
                const quota = target.grade === 'wrong'
                    ? Math.min(2, Math.max(1, target.sourceItems.length))
                    : 1;
                for (let index = 0; index < quota; index += 1) {
                    const item = buildSetReviewVariantQuestion(target, student, programId);
                    if (item) {
                        items.push({
                            ...item,
                            followupFamily: target.family,
                            followupGrade: target.grade,
                            followupMechanismKey: target.mechanismKey || item.mechanismKey || ''
                        });
                    }
                }
            });
            return items.slice(0, 8);
        }

        function buildSetReviewFollowupGroups(items = []) {
            const groups = new Map();
            items.forEach(item => {
                const key = `${item.followupGrade}:${item.followupFamily}:${item.followupMechanismKey || ''}`;
                const current = groups.get(key) || {
                    family: item.followupFamily,
                    grade: item.followupGrade,
                    mechanismKey: item.followupMechanismKey || '',
                    items: []
                };
                current.items.push(item);
                groups.set(key, current);
            });
            return Array.from(groups.values()).sort((a, b) => {
                const severityA = a.grade === 'wrong' ? 2 : 1;
                const severityB = b.grade === 'wrong' ? 2 : 1;
                return severityB - severityA || a.family.localeCompare(b.family);
            });
        }

        function getSetReviewFollowupGroupNote(group) {
            const mechanism = group?.mechanismKey ? `重点机制：${getErrorMechanismLabel(group.mechanismKey)}。` : '';
            if (group.grade === 'wrong') return `${mechanism}先补透这一类概念错，再继续下面的保温题。`.trim();
            return `${mechanism}这一组主要用来防止重复粗心，做完记得检查。`.trim();
        }

        function getSetReviewFollowupItemShape(item = {}) {
            const source = `${item.q || ''} ${item.a || ''}`;
            if (/<div class="frac"|class="mixed"|math-paren-group/.test(source)) return 'fraction';
            if (/%|互化|比|ratio|percent/.test(source)) return 'conversion';
            return 'standard';
        }

        function getSetReviewFollowupItemDensity(item = {}) {
            const source = `${item.q || ''} ${item.a || ''}`;
            const fracCount = (source.match(/class="frac"/g) || []).length;
            const hasMixed = /class="mixed"/.test(source);
            const hasParenGroup = /math-paren-group/.test(source);
            const plainLength = source.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim().length;
            if (hasMixed || fracCount >= 3 || (hasParenGroup && fracCount >= 2)) return 'ultra';
            if (fracCount >= 2 || plainLength >= 30) return 'dense';
            return 'normal';
        }

        function getSetReviewFollowupPrintPack(items = []) {
            const densities = items.map(item => getSetReviewFollowupItemDensity(item));
            const ultraCount = densities.filter(level => level === 'ultra').length;
            const denseCount = densities.filter(level => level === 'dense').length;
            if (items.length >= 7 || ultraCount >= 2 || (ultraCount >= 1 && denseCount >= 2)) return 'compact';
            return 'normal';
        }

        function getSetReviewFollowupPrintSectionTitle(index, label) {
            const numerals = ['一', '二', '三', '四', '五', '六', '七', '八'];
            return `${numerals[index] || `${index + 1}`}、 ${label}`;
        }

        function renderSetReviewFollowupGroups(items = [], { forPrint = false } = {}) {
            const groups = buildSetReviewFollowupGroups(items);
            if (!groups.length) return '';
            return groups.map((group, groupIndex) => {
                const label = SET_REVIEW_FOLLOWUP_LABELS[group.family] || '同类跟训';
                const note = getSetReviewFollowupGroupNote(group);
                const mechanismLabel = group.mechanismKey ? getErrorMechanismLabel(group.mechanismKey) : '';
                const rows = group.items.map((item, idx) => {
                    const number = items.indexOf(item) + 1;
                    const shape = getSetReviewFollowupItemShape(item);
                    const density = getSetReviewFollowupItemDensity(item);
                    return forPrint ? `
                        <div class="followup-print-item" data-shape="${shape}" data-density="${density}">
                            <span class="followup-num">${number}.</span>
                            <div class="followup-q math-row">${item.q || '-'}</div>
                        </div>
                    ` : `
                        <div class="followup-item" data-shape="${shape}" data-density="${density}">
                            <span class="followup-num">${number}.</span>
                            <div class="followup-q math-row">${item.q || item.prompt || '-'}</div>
                        </div>
                    `;
                }).join('');
                if (forPrint) {
                    return `
                    <section class="followup-print-group">
                        <div class="followup-print-group-head">
                            <h3>${getSetReviewFollowupPrintSectionTitle(groupIndex, label)}</h3>
                            <span class="followup-print-kicker">${group.grade === 'wrong' ? '概念错优先' : '粗心保温'}</span>
                        </div>
                        ${mechanismLabel ? `<div class="followup-print-group-note">${mechanismLabel}</div>` : ''}
                        <div class="followup-print-list">${rows}</div>
                    </section>`;
                }
                return `
                <section class="followup-group" data-grade="${group.grade}">
                    <div class="followup-group-head">
                        <div class="followup-group-title-wrap">
                            <span class="followup-group-kicker">${group.grade === 'wrong' ? '概念错优先' : '粗心保温'}</span>
                            <h5 class="followup-group-title">${label}</h5>
                        </div>
                        <span class="followup-group-note">${note}</span>
                    </div>
                    ${mechanismLabel ? `<div class="knowledge-tags" style="margin:0 0 8px;"><span class="knowledge-tag">${mechanismLabel}</span></div>` : ''}
                    <div class="followup-group-list">${rows}</div>
                </section>`;
            }).join('');
        }

        function buildSetReviewFollowupAnswerHTML(items, { forPrint = false } = {}) {
            if (!items.length) return '';
            const rows = items.map((item, idx) => `
                <tr>
                    <td>${idx + 1}</td>
                    <td><div class="math-row">${item.a || item.answer || '-'}</div></td>
                    <td>${item.step || ''}</td>
                </tr>
            `).join('');
            return `
            <div class="set-review-followup-answer ${forPrint ? 'print-answer-sheet' : ''}">
                <h5>参考答案</h5>
                <p class="set-review-followup-answer-note">${forPrint ? '这一页给家长核对用。先让孩子独立完成前面的变式跟训，再回来看这里。' : '建议先独立完成上面的变式跟训，再用这里做核对。'}</p>
                <table class="archive-table">
                    <tr><th>#</th><th>答案</th><th>检查提醒</th></tr>
                    ${rows}
                </table>
            </div>`;
        }

        function buildSetReviewFollowupHTML(student, session) {
            const programId = session?.programId || getCurrentProgramId();
            const items = buildSetReviewFollowupItems(session, student, programId);
            if (!items.length) {
                return `
                <div class="set-review-followup">
                    <div class="set-review-followup-head">
                        <h4>🧩 本套错题变式跟训</h4>
                    </div>
                    <div class="set-review-followup-empty">本套没有可追加的变式跟训，建议直接进入下一套，或做少量口算保温。</div>
                </div>`;
            }
            const wrongCount = (session.details || []).filter(item => item.grade === 'wrong').length;
            const carelessCount = (session.details || []).filter(item => item.grade === 'careless').length;
            const familySummary = Array.from(new Set(items.map(item => SET_REVIEW_FOLLOWUP_LABELS[item.followupFamily] || '同类跟训'))).join('、');
            return `
            <div class="set-review-followup" data-student="${student}">
                <div class="set-review-followup-head">
                    <div>
                        <h4>🧩 本套错题变式跟训</h4>
                        <div class="set-review-followup-subtitle">按这套卷里真正错过的知识点继续补一轮，不重做原题，只追打同一个错误机制。</div>
                    </div>
                    <div class="set-review-followup-actions no-print">
                        <button class="modal-btn" onclick="window.printSetReviewFollowup('${student}', false)">🖨️ 打印变式训练</button>
                        <button class="modal-btn" onclick="window.printSetReviewFollowup('${student}', true)">🖨️ 打印训练+答案</button>
                    </div>
                </div>
                <div class="set-review-followup-overview">
                    <div class="set-review-followup-summary">
                        本次跟训共 <strong>${items.length}</strong> 题。先补透本套里的概念错，再做少量粗心保温；主要覆盖 <strong>${familySummary}</strong>。
                    </div>
                    <div class="set-review-followup-metrics">
                        <div class="followup-metric">
                            <span class="followup-metric-label">本次题量</span>
                            <span class="followup-metric-value">${items.length} 题</span>
                        </div>
                        <div class="followup-metric">
                            <span class="followup-metric-label">概念错优先</span>
                            <span class="followup-metric-value">${wrongCount} 题</span>
                        </div>
                        <div class="followup-metric">
                            <span class="followup-metric-label">粗心保温</span>
                            <span class="followup-metric-value">${carelessCount} 题</span>
                        </div>
                        <div class="followup-metric">
                            <span class="followup-metric-label">覆盖家族</span>
                            <span class="followup-metric-value">${Array.from(new Set(items.map(item => item.followupFamily))).length} 类</span>
                        </div>
                    </div>
                </div>
                <div class="set-review-followup-groups">${renderSetReviewFollowupGroups(items)}</div>
                ${buildSetReviewFollowupAnswerHTML(items)}
            </div>`;
        }

        const CLOSURE_SIGNAL_LABELS = {
            representationGap: '表征切换',
            methodGap: '方法建模',
            stabilityGap: '旧知保温',
            speedGap: '速度稳定',
            validationGap: '结果检验'
        };

        function buildClosureSignalSummary(session) {
            const snapshot = session?.signalSnapshot || {};
            return PROGRAM_SIGNAL_FIELDS.map(field => {
                const label = CLOSURE_SIGNAL_LABELS[field];
                const value = Number(snapshot[field] || 0);
                return `<span class="knowledge-tag">${label} ${value}</span>`;
            }).join('');
        }

        function buildSetReviewSection(student, setNum, highlightStudent) {
            const profile = StorageDB.getProfile(student) || {};
            const session = findSetSession(profile, setNum);
            const isHighlight = !highlightStudent || highlightStudent === student;
            if (!session) {
                return `
                <div class="report-section">
                    <h3>${isHighlight ? '📋' : '🗂️'} ${student} · Set ${setNum}</h3>
                    <div style="padding:15px; color:#64748b;">还没有提交这套卷子的批改记录。</div>
                </div>`;
            }

            const details = (session.details || []).slice().sort((a, b) => {
                const ia = a.info || {}, ib = b.info || {};
                return String(ia.sec || '').localeCompare(String(ib.sec || '')) || (ia.num || 0) - (ib.num || 0);
            });
            const allGrades = session.allGrades || [];
            const wrongCount = details.filter(item => item.grade === 'wrong').length;
            const carelessCount = details.filter(item => item.grade === 'careless').length;
            const perfectCount = Math.max(0, allGrades.length - details.length);
            const isClosureSession = session.programId === CLOSURE_PROGRAM_ID;
            const followupHTML = buildSetReviewFollowupHTML(student, session);

            const rows = details.length ? details.map((detail, idx) => {
                const info = detail.info || {};
                const tip = getKnowledgeTip(detail.tag);
                const gradeText = detail.grade === 'wrong' ? '概念错误' : '粗心失误';
                const gradeColor = detail.grade === 'wrong' ? '#dc2626' : '#b45309';
                return `
                    <tr>
                        <td>${idx + 1}</td>
                        <td>${info.sec || '-'}</td>
                        <td>${info.num ? `第 ${info.num} 题` : '-'}</td>
                        <td><span style="color:${gradeColor}; font-weight:bold;">${gradeText}</span></td>
                        <td><div class="math-row">${info.q || '-'}</div></td>
                        <td><div class="math-row"><strong class="highlight">${info.a || '-'}</strong></div></td>
                        <td>${tip.name}<br><span style="color:#9a3412; font-size:12px;">${info.step || tip.advice}</span></td>
                    </tr>`;
                }).join('') : `<tr><td colspan="7" style="color:#10b981; font-weight:bold;">本套没有错题。可以进入下一套，或做少量口算保持手感。</td></tr>`;

            return `
            <div class="report-section" style="${isHighlight ? 'border-color:#dc2626;' : ''}">
                <h3>${isHighlight ? '📋' : '🗂️'} ${student} · Set ${setNum} ${isClosureSession ? '第二阶段批改报告' : '批改报告'}</h3>
                <div style="padding:12px 15px; background:#f8fafc; border-bottom:1px solid #e2e8f0; font-size:13.5px;">
                    ✅ 正确 ${perfectCount} 题 · ⚠️ 粗心 ${carelessCount} 题 · ❌ 概念 ${wrongCount} 题 · 📓 错题已进入错题本和后续训练
                    ${isClosureSession ? `<div style="margin-top:8px;" class="knowledge-tags">${buildClosureSignalSummary(session)}</div>` : ''}
                </div>
                <div style="padding:15px; max-height:360px; overflow:auto;">
                    <table class="archive-table">
                        <tr><th>#</th><th>分区</th><th>纸面题号</th><th>类型</th><th>原题</th><th>正确答案</th><th>复盘提醒</th></tr>
                        ${rows}
                    </table>
                </div>
                <div class="set-review-followup-wrap">
                    ${followupHTML}
                </div>
            </div>`;
        }

        window.showSetReview = function(setNum = window.currentSetNumber, highlightStudent = null) {
            document.getElementById('modal-title').innerText = getCurrentProgramId() === CLOSURE_PROGRAM_ID
                ? `📋 Set ${setNum} 第二阶段本套报告 / Closure Review`
                : `📋 Set ${setNum} 本套批改报告 / Set Review`;
            const html = buildSetReviewSection('KAI', setNum, highlightStudent) + buildSetReviewSection('Lorik', setNum, highlightStudent);
            document.getElementById('report-content-area').innerHTML = html;
            document.getElementById('report-modal').style.display = 'block';
        };

        window.togglePanel = function() {
            const mainPanel = document.getElementById('main-control-panel');
            const miniPanel = document.getElementById('mini-control-panel');
            if (mainPanel.style.display !== 'none') { mainPanel.style.display = 'none'; miniPanel.style.display = 'block'; }
            else { mainPanel.style.display = 'flex'; miniPanel.style.display = 'none'; }
        };

        let printCleanupTimer = null;
        let printMediaQuery = null;

        function getPrintRoot() {
            return document.getElementById(PRINT_ROOT_ID);
        }

        function buildPrintSandbox(mode) {
            const root = getPrintRoot();
            if (!root) return 0;
            const selector = mode === 'print-questions-only' ? '.sheet.question-sheet' : '.sheet.ans-sheet';
            const sheets = Array.from(document.querySelectorAll(selector));
            root.innerHTML = sheets.map(sheet => sheet.outerHTML).join('');
            return sheets.length;
        }

        function clearPrintMode() {
            if (printCleanupTimer) {
                clearTimeout(printCleanupTimer);
                printCleanupTimer = null;
            }
            document.body.classList.remove('print-questions-only', 'print-answers-only', 'print-quick-review', 'print-set-review-followup', 'print-set-review-followup-with-answers', 'print-sandbox-active');
            const root = getPrintRoot();
            if (root) root.innerHTML = '';
        }

        function schedulePrintCleanupFallback() {
            if (printCleanupTimer) clearTimeout(printCleanupTimer);
            printCleanupTimer = setTimeout(() => {
                clearPrintMode();
            }, 30000);
        }

        function ensurePrintLifecycleHooks() {
            if (typeof window.addEventListener === 'function' && !window.__printCleanupBound) {
                window.addEventListener('afterprint', clearPrintMode);
                window.__printCleanupBound = true;
            }
            if (typeof window.matchMedia === 'function' && !printMediaQuery) {
                printMediaQuery = window.matchMedia('print');
                if (typeof printMediaQuery.addEventListener === 'function') {
                    printMediaQuery.addEventListener('change', event => {
                        if (!event.matches) clearPrintMode();
                    });
                } else if (typeof printMediaQuery.addListener === 'function') {
                    printMediaQuery.addListener(event => {
                        if (!event.matches) clearPrintMode();
                    });
                }
            }
        }

        function runPrintMode(mode) {
            ensurePrintLifecycleHooks();
            clearPrintMode();
            const sheetCount = buildPrintSandbox(mode);
            if (!sheetCount) {
                showToast('打印内容还没有准备好，请刷新后再试。', { background: '#dc2626', duration: 2600 });
                return;
            }
            document.body.classList.add(mode, 'print-sandbox-active');
            showToast(
                mode === 'print-questions-only' ? PRINT_HINT_HTML : '🧾 打印答案提示：建议关闭页眉页脚，并确认只打印答案页。',
                { background: '#0f766e', duration: 2600 }
            );
            const triggerPrint = () => {
                schedulePrintCleanupFallback();
                window.print();
            };
            if (typeof window.requestAnimationFrame === 'function') {
                window.requestAnimationFrame(() => window.requestAnimationFrame(() => setTimeout(triggerPrint, 220)));
            } else {
                setTimeout(triggerPrint, 220);
            }
        }

        window.printQuestionSheets = function() {
            runPrintMode('print-questions-only');
        };

        window.printAnswerSheets = function() {
            runPrintMode('print-answers-only');
        };

        window.printCalculationQuickReview = function() {
            ensurePrintLifecycleHooks();
            clearPrintMode();
            const root = getPrintRoot();
            if (!root) {
                showToast('打印容器还没有准备好，请刷新后再试。', { background: '#dc2626', duration: 2600 });
                return;
            }
            root.innerHTML = `<div class="quick-review-print-shell">${buildCalculationQuickReviewHTML({ forPrint: true })}</div>`;
            document.body.classList.add('print-quick-review', 'print-sandbox-active');
            showToast('📘 打印知识总览提示：建议纵向打印，并关闭页眉页脚。', { background: '#0f766e', duration: 2600 });
            const triggerPrint = () => {
                schedulePrintCleanupFallback();
                window.print();
            };
            if (typeof window.requestAnimationFrame === 'function') {
                window.requestAnimationFrame(() => window.requestAnimationFrame(() => setTimeout(triggerPrint, 220)));
            } else {
                setTimeout(triggerPrint, 220);
            }
        };

        function buildSetReviewFollowupPrintHTML(student, setNum, includeAnswers = false) {
            const profile = StorageDB.getProfile(student) || {};
            const session = findSetSession(profile, setNum);
            if (!session) return '';
            const items = buildSetReviewFollowupItems(session, student, session.programId || getCurrentProgramId());
            if (!items.length) return '';
            const wrongCount = (session.details || []).filter(item => item.grade === 'wrong').length;
            const carelessCount = (session.details || []).filter(item => item.grade === 'careless').length;
            const families = Array.from(new Set(items.map(item => SET_REVIEW_FOLLOWUP_LABELS[item.followupFamily] || '同类跟训'))).join('、');
            const printPack = getSetReviewFollowupPrintPack(items);
            const compactMetaLeft = printPack === 'compact'
                ? `<strong>${items.length} 题</strong> · ${Array.from(new Set(items.map(item => item.followupFamily))).length} 类跟训`
                : `<strong>${items.length} 题</strong> · 覆盖 ${families}`;
            const compactMetaRight = printPack === 'compact'
                ? `${wrongCount} 题概念错优先`
                : `${wrongCount} 题概念错优先 · ${carelessCount} 题粗心保温`;
            const answerBlock = includeAnswers ? buildSetReviewFollowupAnswerHTML(items, { forPrint: true }) : '';
            return `
            <section class="set-review-followup-print-shell" data-pack="${printPack}">
                <header class="booklet-meta-band">
                    <span>${student} · Set ${setNum}</span>
                    <span>Follow-up Practice</span>
                </header>
                <div class="set-review-followup-print-head">
                    <h2 class="sheet-title">错题变式训练</h2>
                    <p class="followup-print-subtitle">根据本套 AB 卷错题生成 · 独立完成后再核对答案</p>
                </div>
                <div class="followup-print-meta">
                    <span>${compactMetaLeft}</span>
                    <span>${compactMetaRight}</span>
                </div>
                <div class="followup-print-sheet">${renderSetReviewFollowupGroups(items, { forPrint: true })}</div>
                ${answerBlock}
            </section>`;
        }

        window.printSetReviewFollowup = function(student, includeAnswers = false) {
            ensurePrintLifecycleHooks();
            clearPrintMode();
            const root = getPrintRoot();
            if (!root) {
                showToast('打印容器还没有准备好，请刷新后再试。', { background: '#dc2626', duration: 2600 });
                return;
            }
            const html = buildSetReviewFollowupPrintHTML(student, window.currentSetNumber, includeAnswers);
            if (!html) {
                showToast('这位学生本套还没有可打印的变式训练。', { background: '#b45309', duration: 2600 });
                return;
            }
            root.innerHTML = html;
            document.body.classList.add(includeAnswers ? 'print-set-review-followup-with-answers' : 'print-set-review-followup', 'print-sandbox-active');
            showToast(includeAnswers ? '🖨️ 打印提示：将输出变式训练和答案参考。' : '🖨️ 打印提示：将只输出变式训练页。', { background: '#0f766e', duration: 2600 });
            const triggerPrint = () => {
                schedulePrintCleanupFallback();
                window.print();
            };
            if (typeof window.requestAnimationFrame === 'function') {
                window.requestAnimationFrame(() => window.requestAnimationFrame(() => setTimeout(triggerPrint, 220)));
            } else {
                setTimeout(triggerPrint, 220);
            }
        };

        // ================= 交互控制与数据编码闭环 =================
        window.changeSet = function(delta) {
            if (window.currentSetNumber + delta < 1) return;
            window.currentSetNumber += delta;
            setProgramSetNumber(getCurrentProgramId(), window.currentSetNumber);
            window.renderPaper();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.markAnswer = function(btn, type) {
            let container = btn.closest('.grade-area');
            let btns = container.querySelectorAll('.grade-btn');
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            let row = btn.closest('.ans-row');
            row.setAttribute('data-grade', type);

            if(type === 'perfect') row.style.backgroundColor = '#f1f8e9';
            else if(type === 'careless') row.style.backgroundColor = '#fff8e1';
            else if(type === 'wrong') row.style.backgroundColor = '#ffebee';
        };

        window.submitGrades = async function(student) {
            const programId = getCurrentProgramId();
            let sheetId = student === 'KAI' ? 'kai-ans-sheet' : 'lorik-ans-sheet';
            let rows = document.querySelectorAll(`#${sheetId} .ans-row`);
            let records = [];

            rows.forEach(row => {
                let tag = row.getAttribute('data-tag');
                let finalGrade = row.getAttribute('data-grade');
                if (!finalGrade) finalGrade = 'perfect';
                let infoStr = row.getAttribute('data-info');

                if (tag && infoStr) {
                    records.push({ tag: tag, grade: finalGrade, info: JSON.parse(decodeURIComponent(infoStr)) });
                }
            });

            if (records.length > 0) {
                await StorageDB.saveSession(student, records, window.currentSetNumber, programId);
                let errCount = records.filter(r => r.grade !== 'perfect').length;
                const toastMsg = programId === CLOSURE_PROGRAM_ID
                    ? `✅ ${student} 的第二阶段已归档！新增/更新 ${errCount} 道错题，并更新第二阶段画像。`
                    : `✅ ${student} 已归档！新增/更新 ${errCount} 道错题到永久错题本。`;
                showToast(toastMsg, { background: '#4caf50', duration: 3000 });

                window.renderPaper();
                window.showSetReview(window.currentSetNumber, student);
            } else {
                alert(`请为 ${student} 批改哦！ (Please grade first!)`);
            }
        };

        window.downloadAllSheetsAsImages = async function() {
            if (typeof window.html2canvas !== 'function') {
                alert('图片导出组件还没有加载完成，请稍后重试，或检查网络后刷新页面。');
                return;
            }
            const btn = document.querySelector('.export-btn') || document.getElementById('download-btn');
            const originalText = btn.innerText;
            btn.innerText = "正在生成图片..."; btn.style.backgroundColor = "#666"; btn.disabled = true;
            const sheets = document.querySelectorAll('.sheet');
            for (let i = 0; i < sheets.length; i++) {
                btn.innerText = `正在生成 ${i + 1} / ${sheets.length} ...`;
                const canvas = await html2canvas(sheets[i], { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
                const link = document.createElement('a');
                link.download = `Math_Page_${i + 1}.png`;
                link.href = canvas.toDataURL('image/png');
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            btn.innerText = "✅ 下载完成！ (Done)"; btn.style.backgroundColor = "#002D72";
            setTimeout(() => { btn.innerText = originalText; btn.style.backgroundColor = "#002D72"; btn.disabled = false; }, 3000);
        };

        // Initialize directly using an async function since module scripts execute after DOM has parsed
        async function startEngine() {
            document.title = `Mini Challenge - 专家私教引擎 ${APP_VERSION} (${APP_RELEASE_LABEL})`;
            const versionLabel = document.getElementById('app-version-label');
            if (versionLabel) versionLabel.textContent = `🧠 专家私教引擎 ${APP_VERSION}`;
            const releaseLabel = document.getElementById('release-note-label');
            if (releaseLabel) releaseLabel.innerHTML = APP_RELEASE_NOTE_HTML;
            renderProgramShell();
            const container = document.getElementById('paper-container');
            if (container) {
                container.innerHTML = "<h2 style='text-align:center; margin-top:50px;'>☁️ 正在连接智能引擎... (Connecting to Engine...)</h2>";
            }
            try {
                await StorageDB.init();
            } catch (e) {
                console.error("Engine initialization error:", e);
            }
            if (typeof window.renderPaper === 'function') {
                window.renderPaper();
            }
            setupAutoCloudPull();
        }

        // Execute immediately
        startEngine();

    </script>
</body>
</html>
